<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KPFM Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    background:#020617;
    color:white;
    font-family:'Inter',sans-serif;
}
.container {
    max-width:1200px;
    margin:auto;
    padding:24px;
}
input {
    width:100%;
    padding:16px;
    border-radius:16px;
    border:none;
    background:#111827;
    color:white;
    margin-bottom:12px;
}
#autocompleteList {
    background:#111827;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:16px;
}
#autocompleteList div {
    padding:12px;
    cursor:pointer;
}
#autocompleteList div:hover {
    background:#1e293b;
}
.tag-container {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}
.tag {
    background:#312e81;
    padding:8px 14px;
    border-radius:999px;
    display:flex;
    gap:8px;
    align-items:center;
}
.tag button {
    border:none;
    background:none;
    color:white;
    cursor:pointer;
}
.table-wrap {
    overflow:auto;
}
table {
    width:100%;
    border-collapse:collapse;
}
th,td {
    padding:16px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}
tr:hover {
    background:#111827;
}
.rank {
    color:#fbbf24;
    font-weight:700;
}
.positive {
    color:#22c55e;
}
.negative {
    color:#ef4444;
}
.match-pill {
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:#1e293b;
}
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}
.modal.show {
    display:flex;
}
.modal-content {
    width:95%;
    max-width:1000px;
    background:#0f172a;
    border-radius:24px;
    padding:24px;
}
.close-btn {
    float:right;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>KPFM Leaderboard</h1>

<input type="text" id="searchBox" placeholder="Search player...">
<div id="autocompleteList"></div>

<div id="filterTags" class="tag-container"></div>

<div class="table-wrap">
<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>KDR</th>
<th>WR</th>
<th>KPR</th>
<th>Matches</th>
<th>ELO</th>
<th>Tier</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="modal" id="matchModal">
<div class="modal-content">
<div class="close-btn" id="closeModal">✕</div>
<h2 id="modalRoundTitle"></h2>
<table id="matchDetails">
<thead>
<tr>
<th>Phantom</th>
<th>K</th>
<th>D</th>
<th>ELO</th>
<th>Ghost</th>
<th>K</th>
<th>D</th>
<th>ELO</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script>

let leaderboardData = [];
let selectedUsers = new Set();
let allMatches = [];
let aftercalcData = [];

const timestamp = `?timestamp=${Date.now()}`;

async function loadData() {

    const [matchRes, lboardRes, aftercalcRes] = await Promise.all([
        fetch(`https://yusi0.github.io/KPFM/match.csv${timestamp}`),
        fetch(`https://yusi0.github.io/KPFM/lboard.csv${timestamp}`),
        fetch(`https://yusi0.github.io/KPFM/aftercalc.csv${timestamp}`)
    ]);

    const [matchText, lboardText, aftercalcText] = await Promise.all([
        matchRes.text(),
        lboardRes.text(),
        aftercalcRes.text()
    ]);

    const matches = csvToJson(matchText);
    const leaderboard = csvToJson(lboardText);

    aftercalcData = csvToJson(aftercalcText);

    allMatches = matches;

    processMatches(matches);
    updateLeaderboardWithEloAndTier(leaderboard);
}

function csvToJson(text) {

    const rows = text.trim().split('
');

    const headers = rows[0]
        .split(',')
        .map(h => h.trim());

    return rows.slice(1).map(row => {

        const values = row
            .split(',')
            .map(v => v.trim());

        return Object.fromEntries(
            headers.map((h, i) => [h, values[i]])
        );
    });
}

function processMatches(matches) {

    const playerStats = {};

    matches.reverse().forEach(match => {

        const nickname = match.Nickname;

        if (!nickname) return;

        if (!playerStats[nickname]) {

            playerStats[nickname] = {
                nickname,
                matches:0,
                kills:0,
                deaths:0,
                wins:0,
                losses:0
            };
        }

        const p = playerStats[nickname];

        p.matches++;
        p.kills += parseInt(match.Kills || 0);
        p.deaths += parseInt(match.Deaths || 0);

        if (parseInt(match.Team) === parseInt(match['Winning Team'])) {
            p.wins++;
        } else {
            p.losses++;
        }
    });

    leaderboardData = Object.values(playerStats);
}

function updateLeaderboardWithEloAndTier(leaderboard) {

    leaderboard.forEach(rankEntry => {

        const player = leaderboardData.find(
            p => p.nickname.toLowerCase() === rankEntry.Nickname.toLowerCase()
        );

        if (player) {
            player.elo = parseInt(rankEntry.ELO || 0);
            player.tier = rankEntry.Tier || 'Unranked';
        }
    });

    leaderboardData.sort((a,b) => b.elo - a.elo);

    leaderboardData.forEach((p,index) => {
        p.rank = index + 1;
    });

    renderLeaderboard(leaderboardData);
}

function refreshLeaderboard() {

    let filteredData;

    if (selectedUsers.size > 0) {

        filteredData = leaderboardData.filter(
            p => selectedUsers.has(p.nickname)
        );

    } else {

        filteredData = leaderboardData;
    }

    renderLeaderboard(filteredData);
}

function renderLeaderboard(data) {

    const tbody = document.querySelector('#leaderboard tbody');

    tbody.innerHTML = '';

    data.forEach(player => {

        const kdr = (
            player.kills / Math.max(1, player.deaths)
        ).toFixed(2);

        const wr = (
            (player.wins / Math.max(1, player.matches)) * 100
        ).toFixed(1) + '%';

        const kpr = (
            player.kills / Math.max(1, player.matches)
        ).toFixed(1);

        const row = document.createElement('tr');

        row.innerHTML = `
            <td class="rank">#${player.rank}</td>
            <td>${player.nickname}</td>
            <td>${kdr}</td>
            <td>${wr}</td>
            <td>${kpr}</td>
            <td>${player.matches}</td>
            <td>${player.elo || 0}</td>
            <td>${player.tier || 'Unranked'}</td>
        `;

        row.onclick = () => {
            window.location.href = `user.html?nickname=${encodeURIComponent(player.nickname)}`;
        };

        tbody.appendChild(row);
    });
}

const searchBox = document.getElementById('searchBox');

searchBox.addEventListener('input', function () {

    const input = this.value.trim().toLowerCase();

    refreshLeaderboard();

    const autocomplete = document.getElementById('autocompleteList');

    autocomplete.innerHTML = '';

    if (input.length > 0) {

        const players = leaderboardData.filter(p =>
            p.nickname.toLowerCase().includes(input)
        );

        players.forEach(player => {

            const item = document.createElement('div');

            item.textContent = player.nickname;

            item.onclick = () => {

                addFilterTag(player.nickname);

                autocomplete.style.display = 'none';

                searchBox.value = '';
            };

            autocomplete.appendChild(item);
        });

        autocomplete.style.display = 'block';

    } else {

        autocomplete.style.display = 'none';
    }
});

function addFilterTag(nickname) {

    if (selectedUsers.has(nickname)) return;

    selectedUsers.add(nickname);

    updateFilterTags();

    refreshLeaderboard();
}

function updateFilterTags() {

    const container = document.getElementById('filterTags');

    container.innerHTML = '';

    selectedUsers.forEach(nickname => {

        const tag = document.createElement('div');

        tag.className = 'tag';

        tag.innerHTML = `
            ${nickname}
            <button>&times;</button>
        `;

        tag.querySelector('button').onclick = () => {

            selectedUsers.delete(nickname);

            updateFilterTags();

            refreshLeaderboard();
        };

        container.appendChild(tag);
    });
}

document.addEventListener('click', (e) => {

    const autocomplete =
        document.getElementById('autocompleteList');

    const searchWrapper =
        document.querySelector('.container');

    if (!searchWrapper.contains(e.target)) {
        autocomplete.style.display = 'none';
    }
});

loadData();

</script>
</body>
</html>
