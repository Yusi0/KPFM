<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Player Status</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #030712;
            --panel: rgba(15, 23, 42, 0.72);
            --panel-solid: #111827;

            --border: rgba(255, 255, 255, 0.07);

            --text: #f8fafc;
            --muted: #94a3b8;

            --accent: #8b5cf6;
            --accent2: #6366f1;

            --green: #22c55e;
            --red: #ef4444;
            --gold: #fbbf24;

            --radius: 28px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Inter', sans-serif;

            background:
                radial-gradient(circle at top left,
                    rgba(99, 102, 241, 0.2),
                    transparent 25%),

                radial-gradient(circle at top right,
                    rgba(139, 92, 246, 0.15),
                    transparent 30%),

                linear-gradient(180deg,
                    #020617,
                    #0f172a);

            color: var(--text);
        }

        body {
            padding: 28px 14px;
        }

        .page {
            max-width: 1320px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;

            margin-bottom: 28px;
        }

        .back-btn {
            width: 52px;
            height: 52px;

            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);

            background: rgba(255, 255, 255, 0.05);

            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;

            transition: 0.2s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);

            background: rgba(255, 255, 255, 0.08);
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
        }

        .gradient-text {
            background:
                linear-gradient(135deg,
                    #c084fc,
                    #8b5cf6,
                    #6366f1);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;

            margin-bottom: 24px;
        }

        .card {
            background: var(--panel);

            border: 1px solid var(--border);

            border-radius: var(--radius);

            backdrop-filter: blur(18px);

            overflow: hidden;

            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .profile-card {
            padding: 28px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 18px;

            margin-bottom: 26px;
        }

        .avatar {
            width: 78px;
            height: 78px;

            border-radius: 24px;

            background:
                linear-gradient(135deg,
                    #8b5cf6,
                    #6366f1);

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 2rem;
            font-weight: 800;
        }

        .nickname-wrap h2 {
            margin: 0;
            font-size: 1.7rem;
        }

        .tier-label {
            margin-top: 8px;
            display: inline-flex;

            padding: 8px 14px;

            border-radius: 999px;

            background: rgba(255, 255, 255, 0.05);

            font-size: 13px;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .stat-box {
            padding: 18px;

            border-radius: 20px;

            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, 0.04),
                    rgba(255, 255, 255, 0.02));

            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-title {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.45rem;
            font-weight: 800;
        }

        .charts-panel {
            padding: 24px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-card {
            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, 0.04),
                    rgba(255, 255, 255, 0.02));

            border: 1px solid rgba(255, 255, 255, 0.05);

            border-radius: 24px;

            padding: 18px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 700;

            margin-bottom: 18px;

            color: #c4b5fd;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        .section {
            margin-top: 24px;
        }

        .section-card {
            padding: 24px;
        }

        .section-title {
            margin-bottom: 20px;

            font-size: 1.4rem;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;

            padding: 16px;

            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;

            color: #c4b5fd;

            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 18px 16px;

            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tbody tr {
            transition: 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .positive {
            color: var(--green);
            font-weight: 700;
        }

        .negative {
            color: var(--red);
            font-weight: 700;
        }

        .tier-copper {
            color: #c08457;
        }

        .tier-bronze {
            color: #cd7f32;
        }

        .tier-silver {
            color: #d1d5db;
        }

        .tier-gold {
            color: #facc15;
        }

        .tier-platinum {
            color: #38bdf8;
        }

        .tier-diamond {
            color: #c084fc;
        }

        .tier-champion {
            color: #f43f5e;
        }

        .tier-unranked {
            color: #94a3b8;
        }

        .match-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            padding: 8px 12px;

            border-radius: 12px;

            background: rgba(255, 255, 255, 0.04);

            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal {
            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, 0.65);

            display: none;
            align-items: center;
            justify-content: center;

            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 95%;
            max-width: 1100px;

            background: #111827;

            border-radius: 28px;

            border: 1px solid rgba(255, 255, 255, 0.06);

            overflow: hidden;
        }

        .modal-header {
            padding: 22px 28px;

            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.06);

            border: none;

            width: 40px;
            height: 40px;

            border-radius: 14px;

            color: white;

            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
            overflow-x: auto;
        }

        @media (max-width: 1100px) {

            .hero-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

        }

        @media (max-width: 768px) {

            .page-title {
                font-size: 1.8rem;
            }

            .profile-card {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .section-card {
                padding: 16px;
            }

            table {
                font-size: 13px;
            }

            thead th,
            tbody td {
                padding: 12px 10px;
            }

        }
    </style>
</head>

<body>

    <div class="page">

        <div class="topbar">

            <button id="backButton" class="back-btn">

                <svg xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    fill="currentColor"
                    viewBox="0 0 16 16">

                    <path fill-rule="evenodd"
                        d="M15 8a.5.5 0 0 1-.5.5H2.707l3.147 3.146a.5.5 0 0 1-.708.708l-4-4a.5.5 0 0 1 0-.708l4-4a.5.5 0 0 1 .708.708L2.707 7.5H14.5a.5.5 0 0 1 .5.5z" />

                </svg>

            </button>

            <div class="page-title">
                <span class="gradient-text">Player</span> Status
            </div>

            <div style="width:52px;"></div>

        </div>

        <div class="hero-grid">

            <div class="card profile-card">

                <div class="profile-header">

                    <div class="avatar" id="avatarLetter">
                        A
                    </div>

                    <div class="nickname-wrap">

                        <h2 id="statNickname">
                            Nickname
                        </h2>

                        <div class="tier-label" id="statTier">
                            Unranked
                        </div>

                    </div>

                </div>

                <div class="stats-grid">

                    <div class="stat-box">
                        <div class="stat-title">Rank</div>
                        <div class="stat-value" id="statRank">#0</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">ELO</div>
                        <div class="stat-value" id="statELO">1500</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">KDR</div>
                        <div class="stat-value" id="statKDR">0</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">KPR</div>
                        <div class="stat-value" id="statKPR">0</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Wins / Losses</div>
                        <div class="stat-value" id="statTotalWL">0 / 0</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Win Rate</div>
                        <div class="stat-value" id="statWR">0%</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Kills / Deaths</div>
                        <div class="stat-value" id="statTotalKD">0 / 0</div>
                    </div>

                    <div class="stat-box">
                        <div class="stat-title">Matches</div>
                        <div class="stat-value" id="statMatches">0</div>
                    </div>

                </div>

            </div>

            <div class="card charts-panel">

                <div class="charts-grid">

                    <div class="chart-card">

                        <div class="chart-title">
                            ELO Trend
                        </div>

                        <canvas id="eloTrend"></canvas>

                    </div>

                    <div class="chart-card">

                        <div class="chart-title">
                            KDR Trend
                        </div>

                        <canvas id="kdrTrend"></canvas>

                    </div>

                </div>

            </div>

        </div>

        <div class="section">

            <div class="card section-card">

                <div class="section-title">
                    Map Statistics
                </div>

                <table id="mapWinRate">

                    <thead>
                        <tr>
                            <th>Map</th>
                            <th>Wins</th>
                            <th>Total</th>
                            <th>Win Rate</th>
                        </tr>
                    </thead>

                    <tbody></tbody>

                </table>

            </div>

        </div>

        <div class="section">

            <div class="card section-card">

                <div class="section-title">
                    Match History
                </div>

                <table id="matchHistory">

                    <thead>
                        <tr>
                            <th>Round</th>
                            <th>Kills</th>
                            <th>Deaths</th>
                            <th>KDR</th>
                            <th>ELO</th>
                        </tr>
                    </thead>

                    <tbody></tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="modal" id="matchModal">

        <div class="modal-content">

            <div class="modal-header">

                <h2 id="modalRoundTitle">
                    Match Details
                </h2>

                <button class="close-btn" id="closeModal">
                    ✕
                </button>

            </div>

            <div class="modal-body">

                <table id="matchDetails">

                    <thead>

                        <tr>
                            <th>Phantom</th>
                            <th>K</th>
                            <th>D</th>
                            <th>ELO</th>
                            <th>Ghost</th>
                            <th>K</th>
                            <th>D</th>
                            <th>ELO</th>
                        </tr>

                    </thead>

                    <tbody></tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
