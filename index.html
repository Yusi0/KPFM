<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPFM Leaderboard</title>

    <!-- Plus Jakarta Sans Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* CSS variables aligned with PFAttach aesthetics */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --bg-glass: rgba(255, 255, 255, 0.4);
            --border-glass: rgba(255, 255, 255, 0.3);
            --shadow-glass: rgba(31, 38, 135, 0.08);
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #5c6bc0;
            --card-bg: rgba(255, 255, 255, 0.45);
            --card-title: #1a252f;
            --table-header: rgba(255, 255, 255, 0.5);
            --filter-active-bg: rgba(92, 107, 192, 0.18);
            --chip-bg: rgba(255, 255, 255, 0.34);
            --gold: #f59e0b;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --bg-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --shadow-glass: rgba(0, 0, 0, 0.3);
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-color: #818cf8;
            --card-bg: rgba(15, 23, 42, 0.7);
            --card-title: #f8fafc;
            --table-header: rgba(15, 23, 42, 0.5);
            --filter-active-bg: rgba(129, 140, 248, 0.18);
            --chip-bg: rgba(255, 255, 255, 0.08);
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Glassmorphism Background Blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.55;
            transition: all 0.5s ease;
        }

        .blob-1 {
            width: 320px;
            height: 320px;
            background: #a78bfa;
            top: 10%;
            left: calc(50% - 300px);
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #60a5fa;
            bottom: 15%;
            right: calc(50% - 280px);
        }

        /* Mobile-First App Container (centered, PFAttach composition) */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 1;
        }

        /* Glass Frame styling */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 32px 0 var(--shadow-glass);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        /* Header styling */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--card-title);
        }

        .theme-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--border-glass);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            color: var(--text-color);
            transition: background 0.3s, transform 0.2s;
            outline: none;
        }

        .theme-btn:active {
            transform: scale(0.95);
        }

        /* Sticky Search Bar */
        .search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            position: sticky;
            top: 10px;
            z-index: 80;
            box-shadow: 0 4px 20px var(--shadow-glass);
            position: relative;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            width: 100%;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        /* Autocomplete dropdown styling matching PFAttach select */
        #autocompleteList {
            position: absolute;
            width: 100%;
            top: calc(100% + 6px);
            left: 0;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            box-shadow: 0 10px 24px var(--shadow-glass);
            z-index: 100;
            display: none;
            max-height: 250px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #autocompleteList::-webkit-scrollbar {
            display: none;
        }

        [data-theme="dark"] #autocompleteList {
            background: rgba(15, 23, 42, 0.9);
        }

        #autocompleteList div {
            padding: 10px 14px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 0.88rem;
            font-weight: 500;
            transition: background 0.2s ease;
        }

        #autocompleteList div:hover {
            background: rgba(92, 107, 192, 0.15);
        }

        /* Team Making Lobby styling */
        .lobby-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            border: 1px solid var(--border-glass);
            background: var(--chip-bg);
            color: var(--text-color);
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 0.76rem;
            font-weight: 800;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .filter-chip button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .filter-chip button:hover {
            color: var(--text-color);
        }

        .control-btn {
            border: none;
            border-radius: 12px;
            height: 42px;
            background: var(--accent-color);
            color: white;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(92, 107, 192, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        [data-theme="dark"] .control-btn {
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.35);
        }

        .control-btn:hover:not(:disabled) {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .control-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .control-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Card list layout */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .card-list::-webkit-scrollbar {
            display: none;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .item-card:hover {
            border-color: rgba(92, 107, 192, 0.35);
            box-shadow: 0 8px 24px var(--shadow-glass);
        }

        .item-card:active {
            transform: scale(0.98);
        }

        .item-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .item-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-card-rank {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--gold);
        }

        .item-card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--card-title);
        }

        .item-card-lobby-toggle {
            border: 1px solid var(--border-glass);
            background: var(--chip-bg);
            color: var(--text-color);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.72rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .item-card-lobby-toggle:hover {
            border-color: var(--accent-color);
        }

        .item-card-lobby-toggle.in-lobby {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 2px 6px rgba(92, 107, 192, 0.2);
        }

        /* Stat chip grid inside cards */
        .stat-chip-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .stat-chip {
            background: var(--chip-bg);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: 8px 6px;
            text-align: center;
        }

        .stat-chip-label {
            display: block;
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-chip-value {
            display: block;
            font-size: 0.8rem;
            color: var(--text-color);
            font-weight: 700;
        }

        /* Tier Badges (Clean and without emojis) */
        .tier-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid currentColor;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tier-copper { color: #c08457; }
        .tier-bronze { color: #cd7f32; }
        .tier-silver { color: #7f8c8d; }
        [data-theme="dark"] .tier-silver { color: #94a3b8; }
        .tier-gold { color: #f59e0b; }
        .tier-platinum { color: #0284c7; }
        [data-theme="dark"] .tier-platinum { color: #38bdf8; }
        .tier-diamond { color: #7c3aed; }
        [data-theme="dark"] .tier-diamond { color: #c084fc; }
        .tier-champion { color: #e11d48; }
        .tier-unranked { color: var(--text-muted); }

        /* General Modal Styling matching PFAttach */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.2s ease-out;
            padding: 16px;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            width: 100%;
            max-width: 440px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 12px 40px var(--shadow-glass);
            transform: scale(0.92) translateY(8px);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--card-title);
        }

        .close-btn {
            background: transparent;
            border: none;
            font-size: 1.4rem;
            color: var(--text-color);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            outline: none;
        }

        .close-btn:hover {
            background: var(--chip-bg);
        }

        .modal-body {
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .modal-body::-webkit-scrollbar {
            display: none;
        }

        /* Loading Screen styling */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            background: var(--bg-gradient);
            color: var(--text-color);
            z-index: 999;
        }
    </style>
</head>

<body>

    <div id="loading">
        데이터 불러오는 중...
    </div>

    <!-- Glowing Fixed Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="app-container" style="display:none;">

        <!-- Header Panel -->
        <header class="glass-panel header">
            <h1>KPFM <span style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-left: 4px; vertical-align: middle;">Leaderboard</span></h1>
            <button class="theme-btn" id="themeToggleBtn" title="화면 테마 변경">☀️</button>
        </header>

        <!-- Stats Overview Panel -->
        <div class="glass-panel" style="display: flex; justify-content: space-between; padding: 12px 20px;">
            <div style="flex: 1; text-align: center;">
                <span style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px;">Total Players</span>
                <span id="playerCount" style="font-size: 1.15rem; font-weight: 800; color: var(--card-title);">0</span>
            </div>
            <div style="width: 1px; background: var(--border-glass);"></div>
            <div style="flex: 1; text-align: center;">
                <span style="display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px;">Ranked Players</span>
                <span id="rankedCount" style="font-size: 1.15rem; font-weight: 800; color: var(--card-title);">0</span>
            </div>
        </div>

        <!-- Sticky Search panel -->
        <div class="glass-panel search-bar">
            <input type="text" id="searchBox" placeholder="Search player..." autocomplete="off">
            <div id="autocompleteList"></div>
        </div>

        <!-- Team Making Lobby Panel -->
        <div class="glass-panel lobby-panel" id="lobbyPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-glass); padding-bottom: 6px;">
                <span style="font-size: 0.72rem; font-weight: 800; color: var(--accent-color); letter-spacing: 0.5px;">TEAM MAKING LOBBY</span>
                <span id="lobbyCount" style="font-size: 0.72rem; font-weight: 800; color: var(--text-muted);">0 selected</span>
            </div>
            <div class="filter-row" id="filterTags" style="min-height: 28px; padding-top: 4px;"></div>
            <button id="teamBalanceButton" class="control-btn" style="width: 100%; margin-top: 4px;" disabled>
                Balance Teams
            </button>
        </div>

        <!-- Leaderboard List -->
        <main class="card-list" id="leaderboardListContainer"></main>

    </div>

    <!-- Team Balancing Results Glass Modal -->
    <div class="modal" id="lobbyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Balanced Squads</h2>
                <button class="close-btn" id="closeLobbyModal">&times;</button>
            </div>
            <div style="padding: 16px; display: flex; flex-direction: column; gap: 14px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <!-- Team 1 (Phantom) -->
                    <div class="glass-panel" style="padding: 12px; background: rgba(92, 107, 192, 0.05); border-radius: 14px;">
                        <h3 style="font-size: 0.8rem; font-weight: 800; color: var(--accent-color); margin-bottom: 8px; border-bottom: 1px solid var(--border-glass); padding-bottom: 4px;">Phantom</h3>
                        <div id="team1List" style="display: flex; flex-direction: column; gap: 6px; min-height: 40px;"></div>
                        <div style="margin-top: 10px; padding-top: 6px; border-top: 1px dashed var(--border-glass); font-size: 0.7rem; font-weight: 800; color: var(--text-muted); display: flex; justify-content: space-between;">
                            <span>AVG ELO</span>
                            <span id="team1Avg" style="color: var(--text-color);">0</span>
                        </div>
                    </div>
                    <!-- Team 2 (Ghost) -->
                    <div class="glass-panel" style="padding: 12px; background: rgba(239, 68, 68, 0.05); border-radius: 14px;">
                        <h3 style="font-size: 0.8rem; font-weight: 800; color: #ef4444; margin-bottom: 8px; border-bottom: 1px solid var(--border-glass); padding-bottom: 4px;">Ghost</h3>
                        <div id="team2List" style="display: flex; flex-direction: column; gap: 6px; min-height: 40px;"></div>
                        <div style="margin-top: 10px; padding-top: 6px; border-top: 1px dashed var(--border-glass); font-size: 0.7rem; font-weight: 800; color: var(--text-muted); display: flex; justify-content: space-between;">
                            <span>AVG ELO</span>
                            <span id="team2Avg" style="color: var(--text-color);">0</span>
                        </div>
                    </div>
                </div>
                <div style="text-align: center; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); border-top: 1px dashed var(--border-glass); padding-top: 10px;">
                    ELO Difference: <span id="eloDiff" style="color: var(--card-title); font-size: 0.85rem;">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set page theme from localStorage
        let currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        
        window.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('themeToggleBtn');
            if (themeBtn) {
                themeBtn.innerText = currentTheme === 'light' ? '🌙' : '☀️';
                themeBtn.addEventListener('click', () => {
                    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', currentTheme);
                    themeBtn.innerText = currentTheme === 'light' ? '🌙' : '☀️';
                    localStorage.setItem('theme', currentTheme);
                });
            }
        });

        let leaderboardData = [];
        let selectedUsers = new Set();
        const timestamp = `?timestamp=${Date.now()}`;

        async function loadAndProcessData() {
            const loading = document.getElementById('loading');
            const container = document.querySelector('.app-container');

            try {
                const [matchResponse, lboardResponse] = await Promise.all([
                    fetch(`match.csv${timestamp}`),
                    fetch(`lboard.csv${timestamp}`)
                ]);

                const [matchText, lboardText] = await Promise.all([
                    matchResponse.text(),
                    lboardResponse.text()
                ]);

                const matchRows = matchText.trim().split('\n');
                const matchHeaders = matchRows[0].split(',').map(h => h.trim());

                const matches = matchRows.slice(1).map(row =>
                    Object.fromEntries(
                        matchHeaders.map((h, i) => [
                            h,
                            row.split(',').map(v => v.trim())[i]
                        ])
                    )
                );

                processMatches(matches);

                const lboardRows = lboardText.trim().split('\n');
                const lboardHeaders = lboardRows[0].split(',').map(h => h.trim());

                const leaderboard = lboardRows.slice(1).map(row =>
                    Object.fromEntries(
                        lboardHeaders.map((h, i) => [
                            h,
                            row.split(',').map(v => v.trim())[i]
                        ])
                    )
                );

                updateLeaderboardWithEloAndTier(leaderboard);

            } catch (err) {
                console.error(err);
                loading.innerText = '데이터 로딩 실패';
            } finally {
                loading.style.display = 'none';
                container.style.display = 'flex';
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndProcessData);

        function processMatches(matches) {
            const playerStats = {};

            matches.reverse().forEach((match) => {
                const nickname = match.Nickname;
                if (!nickname) return;

                if (!playerStats[nickname]) {
                    playerStats[nickname] = {
                        nickname,
                        matches: 0,
                        kills: 0,
                        deaths: 0,
                        wins: 0,
                        losses: 0
                    };
                }

                const p = playerStats[nickname];
                p.matches++;
                p.kills += parseInt(match.Kills, 10) || 0;
                p.deaths += parseInt(match.Deaths, 10) || 0;

                if (parseInt(match['Winning Team']) === parseInt(match.Team)) {
                    p.wins++;
                } else {
                    p.losses++;
                }
            });

            leaderboardData = Object.values(playerStats);
        }

        let searchQuery = '';

        function refreshLeaderboard() {
            let filteredData = leaderboardData;
            if (searchQuery) {
                filteredData = leaderboardData.filter(p =>
                    p.nickname.toLowerCase().includes(searchQuery)
                );
            }
            renderLeaderboard(filteredData);
        }
                
        function updateLeaderboardWithEloAndTier(leaderboard) {
            leaderboard.forEach(rankEntry => {
                const player = leaderboardData.find(
                    p => p.nickname.toLowerCase() === rankEntry.Nickname.toLowerCase()
                );

                if (player) {
                    player.elo = parseInt(rankEntry.ELO) || 0;
                    player.tier = rankEntry.Tier || 'Unranked';
                }
            });

            leaderboardData.sort((a, b) => b.elo - a.elo);

            let rankCounter = 1;
            leaderboardData.forEach(p => {
                p.rank = (p.matches > 5 && p.elo > 0)
                    ? rankCounter++
                    : 'N/A';
            });

            renderLeaderboard(leaderboardData);

            document.getElementById('playerCount').innerText = leaderboardData.length;
            document.getElementById('rankedCount').innerText =
                leaderboardData.filter(p => p.rank !== 'N/A').length;
        }

        function renderLeaderboard(data) {
            const formatTier = (tier) => {
                if (!tier) return 'Unranked';
                return tier.replace('Platinum', 'Plat');
            };

            data.sort((a, b) => {
                const aSelected = selectedUsers.has(a.nickname);
                const bSelected = selectedUsers.has(b.nickname);
                if (aSelected && !bSelected) return -1;
                if (!aSelected && bSelected) return 1;
                return (b.elo || 0) - (a.elo || 0);
            });

            const container = document.getElementById('leaderboardListContainer');
            container.innerHTML = '';

            data.forEach(player => {
                const tierName = player.tier?.split(' ')[0] || 'Unranked';
                const tierClass = `tier-${tierName.toLowerCase()}`;
                const kdr = (player.kills / Math.max(1, player.deaths)).toFixed(2);
                const winRate = player.matches > 0
                    ? ((player.wins / player.matches) * 100).toFixed(1) + '%'
                    : '0%';
                
                const isInLobby = selectedUsers.has(player.nickname);

                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => {
                    window.location.href = `user.html?nickname=${encodeURIComponent(player.nickname)}&t=${Date.now()}`;
                };

                card.innerHTML = `
                    <div class="item-card-header">
                        <div class="item-card-title">
                            <span class="item-card-rank">${player.rank === 'N/A' ? 'N/A' : '#' + player.rank}</span>
                            <span class="item-card-name">${player.nickname}</span>
                            <span class="tier-badge ${tierClass}">${formatTier(player.tier)}</span>
                        </div>
                        <button class="item-card-lobby-toggle ${isInLobby ? 'in-lobby' : ''}" onclick="event.stopPropagation(); toggleLobbyPlayer('${player.nickname.replace(/'/g, "\\'")}')">
                            ${isInLobby ? 'Remove' : '+ Lobby'}
                        </button>
                    </div>
                    <div class="stat-chip-grid">
                        <div class="stat-chip">
                            <span class="stat-chip-label">ELO</span>
                            <span class="stat-chip-value">${player.elo || 'N/A'}</span>
                        </div>
                        <div class="stat-chip">
                            <span class="stat-chip-label">KDR</span>
                            <span class="stat-chip-value">${kdr}</span>
                        </div>
                        <div class="stat-chip">
                            <span class="stat-chip-label">Win Rate</span>
                            <span class="stat-chip-value">${winRate}</span>
                        </div>
                        <div class="stat-chip">
                            <span class="stat-chip-label">Matches</span>
                            <span class="stat-chip-value">${player.matches}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Search Autocomplete Logic
        const searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', function () {
            searchQuery = this.value.trim().toLowerCase();
            refreshLeaderboard();
            
            const autocomplete = document.getElementById('autocompleteList');
            autocomplete.innerHTML = '';
            
            if (searchQuery.length > 0) {
                const players = leaderboardData.filter(p =>
                    p.nickname.toLowerCase().includes(searchQuery)
                );
                
                if (players.length > 0) {
                    players.forEach(player => {
                        const item = document.createElement('div');
                        item.textContent = player.nickname;
                        item.onclick = () => {
                            addFilterTag(player.nickname);
                            autocomplete.style.display = 'none';
                        };
                        autocomplete.appendChild(item);
                    });
                    autocomplete.style.display = 'block';
                }
            } else {
                autocomplete.style.display = 'none';
            }
        });

        function addFilterTag(nickname) {
            if (selectedUsers.has(nickname)) return;
            selectedUsers.add(nickname);
            updateFilterTags();
            
            // Clear search when player is selected via search autocomplete
            searchBox.value = '';
            searchQuery = '';
            refreshLeaderboard();
        }

        function toggleLobbyPlayer(nickname) {
            if (selectedUsers.has(nickname)) {
                selectedUsers.delete(nickname);
            } else {
                selectedUsers.add(nickname);
            }
            updateFilterTags();
            refreshLeaderboard();
        }

        function updateFilterTags() {
            const container = document.getElementById('filterTags');
            container.innerHTML = '';
            
            selectedUsers.forEach(nickname => {
                const chip = document.createElement('div');
                chip.className = 'filter-chip';
                chip.innerHTML = `
                    <span>${nickname}</span>
                    <button onclick="toggleLobbyPlayer('${nickname.replace(/'/g, "\\'")}')">&times;</button>
                `;
                container.appendChild(chip);
            });
            
            document.getElementById('teamBalanceButton').disabled = selectedUsers.size < 2;
            document.getElementById('lobbyCount').innerText = `${selectedUsers.size} selected`;
        }

        // Team Balance logic
        function balanceTeams() {
            const players = Array.from(selectedUsers).map(nickname => {
                return leaderboardData.find(p => p.nickname === nickname) || { nickname, elo: 1000 };
            });

            // Sort by ELO descending
            players.sort((a, b) => (b.elo || 0) - (a.elo || 0));

            const team1 = [];
            const team2 = [];
            let sum1 = 0;
            let sum2 = 0;

            players.forEach(p => {
                const elo = p.elo || 1000;
                if (sum1 <= sum2) {
                    team1.push(p);
                    sum1 += elo;
                } else {
                    team2.push(p);
                    sum2 += elo;
                }
            });

            // Render Team 1
            const t1Container = document.getElementById('team1List');
            t1Container.innerHTML = '';
            team1.forEach(p => {
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justify = 'space-between';
                div.style.fontSize = '0.8rem';
                div.style.fontWeight = '700';
                div.innerHTML = `<span>${p.nickname}</span><span style="color: var(--text-muted);">${p.elo || 'N/A'}</span>`;
                t1Container.appendChild(div);
            });
            document.getElementById('team1Avg').innerText = team1.length > 0 ? Math.round(sum1 / team1.length) : 0;

            // Render Team 2
            const t2Container = document.getElementById('team2List');
            t2Container.innerHTML = '';
            team2.forEach(p => {
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justify = 'space-between';
                div.style.fontSize = '0.8rem';
                div.style.fontWeight = '700';
                div.innerHTML = `<span>${p.nickname}</span><span style="color: var(--text-muted);">${p.elo || 'N/A'}</span>`;
                t2Container.appendChild(div);
            });
            document.getElementById('team2Avg').innerText = team2.length > 0 ? Math.round(sum2 / team2.length) : 0;

            document.getElementById('eloDiff').innerText = Math.abs(sum1 - sum2);

            // Open Modal
            const modal = document.getElementById('lobbyModal');
            modal.classList.add('active');
        }

        document.getElementById('closeLobbyModal').onclick = () => {
            document.getElementById('lobbyModal').classList.remove('active');
        };
        document.getElementById('lobbyModal').onclick = (e) => {
            if (e.target === document.getElementById('lobbyModal')) {
                document.getElementById('lobbyModal').classList.remove('active');
            }
        };
        document.getElementById('teamBalanceButton').onclick = balanceTeams;

        document.addEventListener('click', (e) => {
            const autocomplete = document.getElementById('autocompleteList');
            const searchWrapper = document.querySelector('.search-bar');
            if (searchWrapper && !searchWrapper.contains(e.target)) {
                autocomplete.style.display = 'none';
            }
        });
    </script>

</body>

</html>
