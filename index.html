<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPFM Leaderboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #070b14;
            --bg2: #0f172a;

            --panel: rgba(15, 23, 42, 0.72);
            --panel-solid: #111827;

            --border: rgba(255, 255, 255, 0.08);

            --text: #f8fafc;
            --muted: #94a3b8;

            --accent: #8b5cf6;
            --accent2: #6366f1;

            --gold: #fbbf24;

            --shadow:
                0 10px 30px rgba(0, 0, 0, 0.35);

            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left,
                    rgba(99, 102, 241, 0.18),
                    transparent 30%),
                radial-gradient(circle at top right,
                    rgba(139, 92, 246, 0.14),
                    transparent 25%),
                linear-gradient(180deg, #020617, #0f172a);
            color: var(--text);
        }

        body {
            padding: 32px 16px;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;

            background: var(--panel);
            backdrop-filter: blur(20px);

            border: 1px solid var(--border);
            border-radius: 32px;

            overflow: hidden;

            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .hero {
            position: relative;
            padding: 42px 42px 28px;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            top: -250px;
            right: -100px;
            background: radial-gradient(circle,
                    rgba(139, 92, 246, 0.25),
                    transparent 70%);
            pointer-events: none;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .gradient-text {
            background: linear-gradient(135deg,
                    #c084fc,
                    #8b5cf6,
                    #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-sub {
            margin-top: 14px;
            color: var(--muted);
            font-size: 15px;
        }

        .top-stat-boxes {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .top-stat {
            min-width: 120px;

            background: rgba(255, 255, 255, 0.04);

            border: 1px solid rgba(255, 255, 255, 0.06);

            border-radius: 20px;

            padding: 16px 18px;
        }

        .top-stat-label {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .top-stat-value {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .controls {
            display: flex;
            gap: 14px;
            padding: 28px 42px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 260px;
        }

        input {
            width: 100%;
            height: 60px;

            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.04);

            color: white;
            font-size: 15px;

            padding: 0 20px;

            outline: none;

            transition: 0.25s ease;
        }

        input:focus {
            border-color: rgba(139, 92, 246, 0.7);

            box-shadow:
                0 0 0 5px rgba(139, 92, 246, 0.12);
        }

        button {
            border: none;
            border-radius: 20px;

            padding: 0 26px;

            height: 60px;

            background: linear-gradient(135deg,
                    #8b5cf6,
                    #6366f1);

            color: white;
            font-weight: 700;

            cursor: pointer;

            transition: 0.22s ease;
        }

        button:hover {
            transform: translateY(-2px);

            box-shadow:
                0 14px 25px rgba(99, 102, 241, 0.28);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #autocompleteList {
            position: absolute;
            width: 100%;
            top: calc(100% + 8px);

            background: #111827;

            border: 1px solid rgba(255, 255, 255, 0.08);

            border-radius: 18px;

            overflow: hidden;
            z-index: 50;

            display: none;
        }

        #autocompleteList div {
            padding: 14px 18px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        #autocompleteList div:hover {
            background: rgba(139, 92, 246, 0.15);
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;

            padding: 0 42px 26px;
        }

        .tag {
            display: flex;
            align-items: center;
            gap: 10px;

            padding: 10px 16px;

            border-radius: 999px;

            background: rgba(139, 92, 246, 0.12);

            border: 1px solid rgba(139, 92, 246, 0.22);

            font-size: 14px;
        }

        .tag button {
            height: auto;
            width: auto;
            padding: 0;
            background: transparent;
            font-size: 18px;
        }

        .leaderboard-wrap {
            padding: 0 24px 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        thead th {
            position: sticky;
            top: 0;

            background: rgba(255, 255, 255, 0.03);

            backdrop-filter: blur(12px);

            color: #c4b5fd;

            text-transform: uppercase;
            letter-spacing: 0.08em;

            font-size: 12px;
            font-weight: 700;

            padding: 20px 18px;
            text-align: left;

            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            transition: 0.2s ease;
            cursor: pointer;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        td {
            padding: 22px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rank {
            font-weight: 800;
            color: var(--gold);
        }

        .nickname {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 42px;
            height: 42px;

            border-radius: 14px;

            background:
                linear-gradient(135deg,
                    rgba(139, 92, 246, 0.8),
                    rgba(99, 102, 241, 0.8));

            display: flex;
            align-items: center;
            justify-content: center;

            font-weight: 700;
        }

        .nickname-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nickname-main {
            font-weight: 700;
        }

        .nickname-sub {
            font-size: 12px;
            color: var(--muted);
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            min-width: 70px;

            padding: 8px 12px;

            border-radius: 12px;

            background: rgba(255, 255, 255, 0.04);

            border: 1px solid rgba(255, 255, 255, 0.05);

            font-weight: 700;
        }

        .tier-copper {
            color: #c08457;
        }

        .tier-bronze {
            color: #cd7f32;
        }

        .tier-silver {
            color: #d1d5db;
        }

        .tier-gold {
            color: #facc15;
        }

        .tier-platinum {
            color: #38bdf8;
        }

        .tier-diamond {
            color: #c084fc;
        }

        .tier-champion {
            color: #f43f5e;
        }

        .tier-unranked {
            color: #94a3b8;
        }

        #mobileCards {
            display: none;
        }

        .mobile-card {
            background:
                linear-gradient(180deg,
                    rgba(255, 255, 255, 0.05),
                    rgba(255, 255, 255, 0.02));

            border: 1px solid rgba(255, 255, 255, 0.06);

            border-radius: 24px;

            padding: 20px;

            margin-bottom: 16px;
        }

        .mobile-top {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 18px;
        }

        .mobile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .mobile-stat {
            background: rgba(255, 255, 255, 0.04);

            border-radius: 16px;

            padding: 14px;
        }

        .mobile-stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .mobile-stat-value {
            font-weight: 700;
            font-size: 1.05rem;
        }

        #loading {
            position: fixed;
            inset: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 18px;
            font-weight: 600;

            background: #020617;
            z-index: 999;
        }

        @media (max-width: 900px) {
            body {
                padding: 10px;
            }

            .hero {
                padding: 28px 20px 22px;
            }

            .controls {
                padding: 20px;
            }

            .tag-container {
                padding: 0 20px 20px;
            }

            .leaderboard-wrap {
                padding: 0 14px 14px;
            }

            h1 {
                font-size: 2rem;
            }

            table {
                display: none;
            }

            #mobileCards {
                display: block;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        데이터 불러오는 중...
    </div>

    <div class="container" style="display:none;">

        <section class="hero">

            <div class="title-row">

                <div>
                    <h1>
                        <span class="gradient-text">KPFM</span>
                        Leaderboard
                    </h1>

                    <div class="hero-sub">
                        Competitive ranking dashboard
                    </div>
                </div>

                <div class="top-stat-boxes">
                    <div class="top-stat">
                        <div class="top-stat-label">PLAYERS</div>
                        <div class="top-stat-value" id="playerCount">0</div>
                    </div>

                    <div class="top-stat">
                        <div class="top-stat-label">RANKED</div>
                        <div class="top-stat-value" id="rankedCount">0</div>
                    </div>
                </div>

            </div>

        </section>

        <section class="controls">

            <div class="search-wrapper">
                <input type="text"
                    id="searchBox"
                    placeholder="Search player..."
                    autocomplete="off">

                <div id="autocompleteList"></div>
            </div>

            <button id="teamBalanceButton" disabled>
                Team Making
            </button>

        </section>

        <div id="filterTags" class="tag-container"></div>

        <section class="leaderboard-wrap">

            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>KDR</th>
                        <th>Win Rate</th>
                        <th>KPR</th>
                        <th>Matches</th>
                        <th>ELO</th>
                        <th>Tier</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>

            <div id="mobileCards"></div>

        </section>

    </div>

    <script>

        let leaderboardData = [];
        let selectedUsers = new Set();

        const timestamp = `?timestamp=${Date.now()}`;

        async function loadAndProcessData() {

            const loading = document.getElementById('loading');
            const container = document.querySelector('.container');

            try {

                const [matchResponse, lboardResponse] = await Promise.all([
                    fetch(`https://yusi0.github.io/KPFM/match.csv${timestamp}`),
                    fetch(`https://yusi0.github.io/KPFM/lboard.csv${timestamp}`)
                ]);

                const [matchText, lboardText] = await Promise.all([
                    matchResponse.text(),
                    lboardResponse.text()
                ]);

                const matchRows = matchText.trim().split('\n');
                const matchHeaders = matchRows[0].split(',').map(h => h.trim());

                const matches = matchRows.slice(1).map(row =>
                    Object.fromEntries(
                        matchHeaders.map((h, i) => [
                            h,
                            row.split(',').map(v => v.trim())[i]
                        ])
                    )
                );

                processMatches(matches);

                const lboardRows = lboardText.trim().split('\n');
                const lboardHeaders = lboardRows[0].split(',').map(h => h.trim());

                const leaderboard = lboardRows.slice(1).map(row =>
                    Object.fromEntries(
                        lboardHeaders.map((h, i) => [
                            h,
                            row.split(',').map(v => v.trim())[i]
                        ])
                    )
                );

                updateLeaderboardWithEloAndTier(leaderboard);

            } catch (err) {

                console.error(err);
                loading.innerText = '데이터 로딩 실패';

            } finally {

                loading.style.display = 'none';
                container.style.display = 'block';

            }

        }

        document.addEventListener('DOMContentLoaded', loadAndProcessData);

        function processMatches(matches) {

            const playerStats = {};

            matches.forEach(match => {

                const nickname = match.Nickname;

                if (!nickname) return;

                if (!playerStats[nickname]) {

                    playerStats[nickname] = {
                        nickname,
                        matches: 0,
                        kills: 0,
                        deaths: 0,
                        wins: 0,
                        losses: 0
                    };

                }

                const p = playerStats[nickname];

                p.matches++;
                p.kills += parseInt(match.Kills, 10) || 0;
                p.deaths += parseInt(match.Deaths, 10) || 0;

                if (parseInt(match['Winning Team']) === parseInt(match.Team)) {
                    p.wins++;
                } else {
                    p.losses++;
                }

            });

            leaderboardData = Object.values(playerStats);

        }

        function updateLeaderboardWithEloAndTier(leaderboard) {

            leaderboard.forEach(rankEntry => {

                const player = leaderboardData.find(
                    p => p.nickname.toLowerCase() === rankEntry.Nickname.toLowerCase()
                );

                if (player) {

                    player.elo = parseInt(rankEntry.ELO) || 0;
                    player.tier = rankEntry.Tier || 'Unranked';

                }

            });

            leaderboardData.sort((a, b) => b.elo - a.elo);

            let rankCounter = 1;

            leaderboardData.forEach(p => {

                p.rank = (p.matches > 5 && p.elo > 0)
                    ? rankCounter++
                    : 'N/A';

            });

            renderLeaderboard(leaderboardData);

            document.getElementById('playerCount').innerText =
                leaderboardData.length;

            document.getElementById('rankedCount').innerText =
                leaderboardData.filter(p => p.rank !== 'N/A').length;

        }

        function renderLeaderboard(data) {

            const tbody =
                document.querySelector('#leaderboard tbody');

            const mobile =
                document.getElementById('mobileCards');

            tbody.innerHTML = '';
            mobile.innerHTML = '';

            data.forEach(player => {

                const tierName =
                    player.tier?.split(' ')[0] || 'Unranked';

                const tierClass =
                    `tier-${tierName.toLowerCase()}`;

                const kdr =
                    (player.kills / Math.max(1, player.deaths)).toFixed(2);

                const winRate =
                    player.matches > 0
                        ? ((player.wins / player.matches) * 100).toFixed(1) + '%'
                        : '0%';

                const kpr =
                    player.matches > 0
                        ? (player.kills / player.matches).toFixed(1)
                        : '0';

                const goToProfile = () => {

                    window.location.href =
                        `user.html?nickname=${encodeURIComponent(player.nickname)}`;

                };

                const row = document.createElement('tr');

                row.onclick = goToProfile;

                row.innerHTML = `
                    <td class="rank">#${player.rank}</td>

                    <td>
                        <div class="nickname">

                            <div class="avatar">
                                ${player.nickname[0].toUpperCase()}
                            </div>

                            <div class="nickname-meta">
                                <div class="nickname-main">
                                    ${player.nickname}
                                </div>

                                <div class="nickname-sub ${tierClass}">
                                    ${player.tier || 'Unranked'}
                                </div>
                            </div>

                        </div>
                    </td>

                    <td>
                        <div class="stat-pill">${kdr}</div>
                    </td>

                    <td>
                        <div class="stat-pill">${winRate}</div>
                    </td>

                    <td>
                        <div class="stat-pill">${kpr}</div>
                    </td>

                    <td>${player.matches}</td>

                    <td>
                        <strong>${player.elo || 'N/A'}</strong>
                    </td>

                    <td class="${tierClass}">
                        ${player.tier || 'Unranked'}
                    </td>
                `;

                tbody.appendChild(row);

                const card = document.createElement('div');

                card.className = 'mobile-card';

                card.onclick = goToProfile;

                card.innerHTML = `
                    <div class="mobile-top">

                        <div class="nickname">

                            <div class="avatar">
                                ${player.nickname[0].toUpperCase()}
                            </div>

                            <div class="nickname-meta">
                                <div class="nickname-main">
                                    ${player.nickname}
                                </div>

                                <div class="nickname-sub ${tierClass}">
                                    ${player.tier || 'Unranked'}
                                </div>
                            </div>

                        </div>

                        <div class="rank">
                            #${player.rank}
                        </div>

                    </div>

                    <div class="mobile-grid">

                        <div class="mobile-stat">
                            <div class="mobile-stat-label">ELO</div>
                            <div class="mobile-stat-value">
                                ${player.elo || 'N/A'}
                            </div>
                        </div>

                        <div class="mobile-stat">
                            <div class="mobile-stat-label">KDR</div>
                            <div class="mobile-stat-value">
                                ${kdr}
                            </div>
                        </div>

                        <div class="mobile-stat">
                            <div class="mobile-stat-label">WIN RATE</div>
                            <div class="mobile-stat-value">
                                ${winRate}
                            </div>
                        </div>

                        <div class="mobile-stat">
                            <div class="mobile-stat-label">MATCHES</div>
                            <div class="mobile-stat-value">
                                ${player.matches}
                            </div>
                        </div>

                    </div>
                `;

                mobile.appendChild(card);

            });

        }

        const searchBox = document.getElementById('searchBox');

        searchBox.addEventListener('input', function () {

            const input =
                this.value.trim().toLowerCase();

            const filtered =
                input.length > 0
                    ? leaderboardData.filter(p =>
                        p.nickname.toLowerCase().includes(input))
                    : leaderboardData;

            renderLeaderboard(filtered);

            const autocomplete =
                document.getElementById('autocompleteList');

            autocomplete.innerHTML = '';

            if (input.length > 0) {

                const players =
                    leaderboardData.filter(p =>
                        p.nickname.toLowerCase().includes(input));

                if (players.length > 0) {

                    players.forEach(player => {

                        const item =
                            document.createElement('div');

                        item.textContent =
                            player.nickname;

                        item.onclick = () => {

                            addFilterTag(player.nickname);

                            autocomplete.style.display = 'none';

                            searchBox.value = '';

                        };

                        autocomplete.appendChild(item);

                    });

                    autocomplete.style.display = 'block';

                }

            } else {

                autocomplete.style.display = 'none';

            }

        });

        function addFilterTag(nickname) {

            if (selectedUsers.has(nickname)) return;

            selectedUsers.add(nickname);

            updateFilterTags();

        }

        function updateFilterTags() {

            const container =
                document.getElementById('filterTags');

            container.innerHTML = '';

            selectedUsers.forEach(nickname => {

                const tag =
                    document.createElement('div');

                tag.className = 'tag';

                tag.innerHTML = `
                    ${nickname}
                    <button>&times;</button>
                `;

                tag.querySelector('button').onclick = () => {

                    selectedUsers.delete(nickname);

                    updateFilterTags();

                };

                container.appendChild(tag);

            });

            document.getElementById('teamBalanceButton').disabled =
                selectedUsers.size < 2;

        }

    </script>

</body>

</html>
